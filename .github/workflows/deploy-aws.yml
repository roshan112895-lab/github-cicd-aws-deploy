name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build deployment package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r src public scripts deploy/
          cp package.json package-lock.json ecosystem.config.js deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          AUTH_TOKEN_SECRET: ${{ secrets.AUTH_TOKEN_SECRET }}
          AUTH_TOKEN_TTL: ${{ secrets.AUTH_TOKEN_TTL }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << EOF
          set -e
          cd /var/www/express-app

          echo "Fixing directory ownership..."
          sudo chown -R \$USER:\$USER /var/www/express-app

          if [ -d src ]; then
            timestamp=\$(date +%Y%m%d_%H%M%S)
            mkdir -p backups
            tar -czf "backups/backup_\${timestamp}.tar.gz" \
              src public scripts package.json package-lock.json ecosystem.config.js .env 2>/dev/null || true
            ls -t backups/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
          fi

          echo "Extracting new deployment package..."
          tar --overwrite -xzf /tmp/deploy.tar.gz -C /var/www/express-app
          rm /tmp/deploy.tar.gz

          echo "Writing production .env (Supabase)..."
          printf '%s\n' \
            "PORT=5001" \
            "NODE_ENV=production" \
            "DATABASE_URL=${DATABASE_URL}" \
            "DIRECT_URL=${DIRECT_URL}" \
            "AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET}" \
            "AUTH_TOKEN_TTL=${AUTH_TOKEN_TTL:-86400}" \
            > .env

          sudo chown -R \$USER:\$USER /var/www/express-app
          mkdir -p logs

          echo "Installing production dependencies..."
          npm ci --omit=dev

          if pm2 describe express-app > /dev/null 2>&1; then
            echo "Reloading PM2 app..."
            pm2 reload ecosystem.config.js --update-env
          else
            echo "Starting PM2 app..."
            pm2 start ecosystem.config.js
          fi

          pm2 save
          echo "Deploy complete."
          EOF

          rm private_key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for application to start..."
          sleep 10

          for i in 1 2 3 4 5; do
            echo "Attempt $i of 5..."

            health=$(curl -s "http://${EC2_HOST}/health" 2>/dev/null || echo "")
            if echo "$health" | grep -q '"status":"ok"'; then
              echo "Health check passed: $health"

              tasks=$(curl -s "http://${EC2_HOST}/api/tasks" 2>/dev/null || echo "")
              if echo "$tasks" | grep -q '"data"'; then
                echo "API check passed: /api/tasks responded"
              fi
              exit 0
            fi

            status=$(curl -s -o /dev/null -w "%{http_code}" "http://${EC2_HOST}/" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Deployment successful! Homepage returned HTTP $status"
              exit 0
            fi

            echo "Health: $health | Homepage HTTP: $status — retrying in 5s..."
            sleep 5
          done

          echo "Deployment verification failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Attempting rollback..."

          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'
          cd /var/www/express-app
          sudo chown -R $USER:$USER /var/www/express-app

          latest_backup=$(ls -t backups/backup_*.tar.gz 2>/dev/null | head -1)

          if [ -n "$latest_backup" ]; then
            echo "Restoring backup: $latest_backup"
            tar -xzf "$latest_backup" -C /var/www/express-app
            npm ci --omit=dev
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
            echo "Rollback complete"
          else
            echo "No backup found, cannot rollback"
          fi
          EOF

          rm private_key.pem
