<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>TaskFlow</span>
      </div>

      <nav class="nav-filters">
        <button class="nav-btn active" data-status="">All Tasks</button>
        <button class="nav-btn" data-status="todo">
          <span class="status-dot todo"></span> To Do
        </button>
        <button class="nav-btn" data-status="in_progress">
          <span class="status-dot in-progress"></span> In Progress
        </button>
        <button class="nav-btn" data-status="done">
          <span class="status-dot done"></span> Done
        </button>
      </nav>

      <div class="sidebar-stats" id="stats">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-overdue">0</span>
          <span class="stat-label">Overdue</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1 id="page-title">All Tasks</h1>
          <p class="subtitle" id="task-count">0 tasks</p>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="search" id="search-input" placeholder="Search tasks...">
          </div>
          <select id="priority-filter" class="select">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button class="btn btn-primary" id="new-task-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New Task
          </button>
        </div>
      </header>

      <div class="task-list" id="task-list"></div>

      <div class="empty-state hidden" id="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <h3>No tasks found</h3>
        <p>Create your first task to get started</p>
        <button class="btn btn-primary" id="empty-new-btn">Create Task</button>
      </div>
    </main>
  </div>

  <dialog class="modal" id="task-modal">
    <form id="task-form" class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button type="button" class="btn-icon" id="close-modal" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <input type="hidden" id="task-id">

      <div class="form-group">
        <label for="task-title">Title</label>
        <input type="text" id="task-title" required placeholder="What needs to be done?">
      </div>

      <div class="form-group">
        <label for="task-description">Description</label>
        <textarea id="task-description" rows="3" placeholder="Add details..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="task-status">Status</label>
          <select id="task-status">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-priority">Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-due">Due Date</label>
          <input type="date" id="task-due">
        </div>
      </div>

      <div class="form-group">
        <label for="task-tags">Tags</label>
        <input type="text" id="task-tags" placeholder="frontend, bug, urgent (comma-separated)">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-danger hidden" id="delete-task-btn">Delete</button>
        <div class="modal-footer-right">
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </div>
    </form>
  </dialog>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
